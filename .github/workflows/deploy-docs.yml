name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master # Hoặc nhánh chính của bạn
    paths:
      - 'foodbee-docs/**' # Chỉ chạy khi có thay đổi trong thư mục tài liệu

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: foodbee-docs/package-lock.json

      - name: Install dependencies
        run: cd foodbee-docs && npm install

      - name: Build website
        run: cd foodbee-docs && npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./foodbee-docs/build
